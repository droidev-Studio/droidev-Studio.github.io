<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gamia AI Games</title>
  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: #fff7df;
      color: #342717;
    }
    body {
      display: grid;
      place-items: center;
      padding: 28px;
    }
    main {
      width: min(560px, 100%);
      text-align: center;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 36px;
      line-height: 1.1;
    }
    p {
      margin: 0 0 24px;
      color: #72573a;
      font-size: 16px;
      line-height: 1.5;
    }
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 22px;
      border-radius: 12px;
      background: #ff7a3d;
      color: #fff;
      font-weight: 700;
      text-decoration: none;
      box-shadow: 0 4px 0 #c95528;
    }
  </style>
</head>
<body>
  <main>
    <h1>Gamia AI Games</h1>
    <p>Small browser games built for quick play.</p>
    <a href="./tower_game/">Play Tower Building</a>
  </main>
</body>
</html>
